# Деплой на GitHub Pages ОТКЛЮЧЁН для автозапуска: проект публикуется на
# Cloudflare Pages (Cloudflare сам собирает из этого репозитория). Этот workflow
# оставлен как запасной вариант и запускается ТОЛЬКО вручную (workflow_dispatch),
# поэтому push'и больше не падают с ошибкой "Ensure GitHub Pages has been enabled".
#
# Чтобы вообще убрать его — удалите этот файл на своём ПК (в песочнице удаление
# файлов заблокировано). Чтобы всё-таки пользоваться GitHub Pages — включите
# Pages: Settings → Pages → Source: GitHub Actions, затем запустите workflow
# вручную во вкладке Actions.
name: Deploy to GitHub Pages (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build (base = /<repo>/)
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
